<section id="contact-info" class="py-5 section-padding bg-light">
  <div class="container pb-5 pt-3">
    <div class="text-center mb-5 fade-in-up">
      <h6 class="text-gold fw-bold text-uppercase tracking-wide">Liên Hệ</h6>
      <h2 class="display-5 fw-bold text-dark-blue">Kết Nối Với Chúng Tôi</h2>
      <p class="text-muted fs-5 mt-3">
        Chúng tôi luôn sẵn sàng hỗ trợ để mang đến cho bạn kỳ nghỉ hoàn hảo
        nhất.
      </p>
    </div>

    <div class="row g-5">
      <div class="col-lg-4 fade-in-up delay-1">
        <div
          class="p-4 bg-white rounded shadow-sm h-100 border-start border-5"
          style="border-color: #d4af37 !important"
        >
          <h4 class="fw-bold mb-4 text-dark-blue">Thông Tin Trực Tiếp</h4>

          <div class="d-flex align-items-center mb-4">
            <div class="bg-light p-3 rounded-circle shadow-sm me-3 text-gold">
              <i class="fas fa-map-marker-alt fs-4"></i>
            </div>
            <div>
              <h6 class="fw-bold mb-1">Địa chỉ</h6>
              <p class="text-muted mb-0">123 Ocean Drive, Vũng Tàu, Việt Nam</p>
            </div>
          </div>

          <div class="d-flex align-items-center mb-4">
            <div class="bg-light p-3 rounded-circle shadow-sm me-3 text-gold">
              <i class="fas fa-phone-alt fs-4"></i>
            </div>
            <div>
              <h6 class="fw-bold mb-1">Điện thoại</h6>
              <p class="text-muted mb-0">+84 123 456 789</p>
            </div>
          </div>

          <div class="d-flex align-items-center">
            <div class="bg-light p-3 rounded-circle shadow-sm me-3 text-gold">
              <i class="fas fa-envelope fs-4"></i>
            </div>
            <div>
              <h6 class="fw-bold mb-1">Email</h6>
              <p class="text-muted mb-0">info@premierpearl.com</p>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-8 fade-in-up delay-2">
        <div class="p-4 bg-white rounded shadow-sm h-100">
          <h4 class="fw-bold mb-4 text-dark-blue">
            Gửi Tin Nhắn Cho Chúng Tôi
          </h4>
          <form action="#" method="POST">
            <div class="row g-3">
              <div class="col-md-6">
                <div class="form-floating">
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    placeholder="Họ và Tên"
                    required
                  />
                  <label for="name">Họ và Tên</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating">
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="Email của bạn"
                    required
                  />
                  <label for="email">Email</label>
                </div>
              </div>
              <div class="col-md-12">
                <div class="form-floating">
                  <input
                    type="text"
                    class="form-control"
                    id="subject"
                    placeholder="Tiêu đề"
                    required
                  />
                  <label for="subject">Tiêu đề (Chủ đề)</label>
                </div>
              </div>
              <div class="col-12">
                <div class="form-floating">
                  <textarea
                    class="form-control"
                    placeholder="Nội dung tin nhắn"
                    id="message"
                    style="height: 150px"
                    required
                  ></textarea>
                  <label for="message">Nội dung tin nhắn</label>
                </div>
              </div>
              <div class="col-12 mt-4">
                <button
                  class="btn btn-gold btn-lg rounded-pill px-5 fw-bold w-100 text-white"
                  style="background-color: #d4af37; border: none"
                  type="submit"
                >
                  Gửi Tin Nhắn
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="row mt-5 fade-in-up delay-3">
      <div class="col-12">
        <div class="rounded shadow-sm overflow-hidden" style="height: 400px">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3924.627293529249!2d107.08544931479704!3d10.33947499261882!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31756fd16e91f153%3d0x22137021eb31a8!2zVsWpbmcgVMOgdSwgQsOgIFLhu4thIC0gVsWpbmcgVMOgdSwgVmnhu4d0IE5hbQ!5e0!3m2!1svi!2s!4v1689150000000!5m2!1svi!2s"
            width="100%"
            height="100%"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          >
          </iframe>
        </div>
      </div>
    </div>
  </div>
</section>
