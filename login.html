<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Vinpearl Luxury Nha Trang</title>
    <link rel="icon" type="image/png" href="./assets/images/logo/favicon.png">

    <!-- Icons & Bootstrap -->
    <link rel="stylesheet" href="./assets/fonts/fontawesome-free-7.2.0-web/css/all.min.css">
    <link rel="stylesheet" href="./assets/bootstrap-5.3.8-dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/globalStyle.css">
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>

    <div class="login-page-wrapper">
        <!-- Simplified Header -->
        <header class="login-header">
            <a href="./home.html" class="back-home">
                <i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ
            </a>
            <div class="brand-logos d-none d-sm-flex mb-0">
                <img src="./assets/images/logo/lux Nha trang-02_1679990219.svg" alt="Vinpearl" style="height: 30px;">
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="login-card-centered fade-in-up">

                <!-- Restored High-Fidelity Branding -->
                <div class="text-center mb-4">
                    <div style="display:flex; justify-content:center; align-items:center; gap:15px; margin-bottom:20px;">
                        <img src="./assets/images/login/vinpearl.png" alt="" style="height:70px;">
                        <div style="width:1px; height:40px; background-color:rgba(255, 255, 255, 1);"></div>
                        <img src="./assets/images/login/vinclub.png" alt="" style="height:70px;">
                    </div>
                </div>

                <!-- Tabs -->
                <div class="login-tabs">
                    <div class="login-tab active-tab" id="tabLogin" onclick="showLogin()">Đăng nhập</div>
                    <div class="login-tab" id="tabRegister" onclick="showRegister()">Đăng ký</div>
                </div>

                <!-- Login Form -->
                <div id="loginForm">
                    <form id="loginFormElement">
                        <div class="form-group mb-4">
                            <input type="text" id="loginIdentifier" data-type="email-phone" class="form-control"
                                placeholder="Email / Số điện thoại">
                            <small class="error-msg d-none"></small>
                        </div>
                        <div class="form-group mb-4">
                            <input type="password" id="loginPassword" data-type="password" class="form-control"
                                placeholder="Mật khẩu">
                            <small class="error-msg d-none"></small>
                        </div>

                        <div class="form-utils mb-5">
                            <label><input type="checkbox" style="width:18px;height:18px;"> <span>Ghi nhớ tài
                                    khoản</span></label>
                            <a href="#">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn-vp-primary">ĐĂNG NHẬP</button>

                        <div class="redirect-sec text-center">
                            Chưa có tài khoản? <a href="javascript:void(0)" onclick="showRegister()">Đăng ký ngay</a>
                        </div>
                    </form>
                </div>

                <!-- Register Form -->
                <div id="registerForm" style="display:none;">
                    <form id="registerFormElement">
                        <div class="form-group mb-4">
                            <input type="text" id="regIdentifier" data-type="email-phone" class="form-control"
                                placeholder="Email / Số điện thoại">
                            <small class="error-msg d-none"></small>
                        </div>
                        <div class="row g-2 mb-0">
                            <div class="col-6">
                                <div class="form-group">
                                    <input type="text" id="regFirst" class="form-control" placeholder="Họ">
                                    <small class="error-msg d-none"></small>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-group">
                                    <input type="text" id="regFull" class="form-control" placeholder="Tên và Tên đệm">
                                    <small class="error-msg d-none"></small>
                                </div>
                            </div>
                        </div>
                        <div class="form-group mb-4">
                            <input type="password" id="regPassword" data-type="password" class="form-control"
                                placeholder="Mật khẩu (>= 6 ký tự)">
                            <small class="error-msg d-none"></small>
                        </div>
                        <div class="form-group mb-5">
                            <input type="password" id="regConfirm" data-type="confirm-password" class="form-control"
                                placeholder="Xác nhận mật khẩu">
                            <small class="error-msg d-none"></small>
                        </div>

                        <button type="submit" class="btn-vp-primary">ĐĂNG KÝ</button>

                        <div class="redirect-sec text-center">
                            Đã có tài khoản? <a href="javascript:void(0)" onclick="showLogin()">Đăng nhập</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="login-footer-bottom">
            <div class="container">
                <p class="mb-1">© 2026 Vinpearl Luxury Nha Trang. Bảo lưu mọi quyền.</p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="./terms.html" class="text-white-50 text-decoration-none small">Điều khoản</a>
                    <a href="./terms.html" class="text-white-50 text-decoration-none small">Bảo mật</a>
                    <a href="./contact.html" class="text-white-50 text-decoration-none small">Hỗ trợ</a>
                </div>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="./assets/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/login.js"></script>
</body>

</html>
