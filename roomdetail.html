<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Room Detail - Premier Pearl Hotel Vũng Tàu - Luxury Experience
    </title>
    <link rel="icon" type="image/png" href="./assets/images/logo/favicon.png" />

    <!-- Font Awesome & Bootstrap (offline) -->
    <link
      rel="stylesheet"
      href="./assets/fonts/fontawesome-free-7.2.0-web/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="./assets/bootstrap-5.3.8-dist/css/bootstrap.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/globalStyle.css" />
    <link rel="stylesheet" href="./css/roomdetail.css" />
  </head>
  <body>
    <!-- Room Detail Modal-like View -->
    <div id="room-modal" class="room-modal-overlay" aria-hidden="true">
      <div class="room-modal">
        <button class="rd-close" aria-label="Close">&times;</button>

        <div class="rd-inner">
          <h2 id="rd-title" class="rd-title">Room name</h2>

          <div class="rd-gallery">
            <button id="rd-prev" class="rd-prev" aria-label="Previous">
              <i class="fas fa-chevron-left"></i>
            </button>
            <img id="rd-main-img" class="rd-main-img" src="" alt="Room image" />
            <button id="rd-next" class="rd-next" aria-label="Next">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>

          <div class="rd-content">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <p id="rd-price" class="rd-price">Giá</p>
              <a
                id="rd-book"
                class="btn btn-gold rounded-pill px-4 py-2 fw-bold"
                href="./booking.html"
                >Book Now</a
              >
            </div>

            <p id="rd-desc" class="rd-desc text-muted">Mô tả phòng...</p>

            <h5 class="mt-4">Tiện ích</h5>
            <div id="rd-amenities" class="rd-amenities">
              <!-- Amenities will be injected here -->
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Bootstrap Bundle with Popper Offline -->
    <!-- Mapped path for offline bootstrap js -->
    <script src="./assets/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Scripts -->
    <script src="js/script.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const rooms = [
          {
            id: "pool-villa",
            name: "Biệt thự hướng bể bơi",
            price: "7.040.000VNĐ / đêm",
            description:
              "Với diện tích 60 m², Biệt thự 1 phòng ngủ hướng Hồ bơi là biệt thư thiết kế sang trọng, tích hợp đầy đủ tiện nghi cho kỳ lưu trú của bạn. Sở hữu không gian rộng rãi và hồ bơi riêng, Biệt thự là lựa chọn lý tưởng dành cho các cặp đôi và các gia đình nhỏ đi du lịch nghỉ dưỡng.",
            images: [
              "b552dca59bb546648e1b37d41da0cea2_pool villa kuxx.png",
              "1 1 1 1.png",
              "1 1 1.png",
              "1 1.png",
              "1.png",
            ],
            amenities: [
              { icon: "fas fa-swimming-pool", label: "Bể bơi" },
              { icon: "fas fa-tv", label: "TV màn hình phẳng" },
              { icon: "fas fa-wifi", label: "Wifi miễn phí" },
              { icon: "fas fa-snowflake", label: "Điều hòa" },
              { icon: "fas fa-bath", label: "Bồn tắm" },
              { icon: "fas fa-wine-bottle", label: "Minibar" },
            ],
          },
          {
            id: "ocean-villa",
            name: "Biệt thự hướng biển",
            price: "8.570.000VNĐ / đêm",
            description:
              "Với diện tích 75 m², biệt thự có thiết kế sang trọng, thông minh, tích hợp đầy đủ tiện nghi cho kỳ lưu trú của bạn. Tầm nhìn hướng ra biển lãng mạn, có bể bơi riêng, biệt thự là lựa chọn lý tưởng dành cho các cặp đôi đi du lịch nghỉ dưỡng hoặc chuyến công tác 2 người.",
            images: [
              "6c1fb58b042e4e4d935ff3a2f2d841ae_VPLRNT__Grand_Duplex_Villa_13.png",
              "2_2.png",
              "22.png",
              "222.png",
              "22222.png",
              "222222.png",
            ],
            amenities: [
              { icon: "fas fa-water", label: "Hướng biển" },
              { icon: "fas fa-tv", label: "TV màn hình phẳng" },
              { icon: "fas fa-wifi", label: "Wifi miễn phí" },
              { icon: "fas fa-umbrella-beach", label: "Ban công" },
              { icon: "fas fa-bed", label: "Giường lớn" },
              { icon: "fas fa-bell-concierge", label: "Dịch vụ phòng" },
            ],
          },
          {
            id: "duplex-villa",
            name: "Biệt thự 2 tầng",
            price: "9.660.000VNĐ / đêm",
            description:
              "Với diện tích 110 m², biệt thự có thiết kế 2 tầng sang trọng, rộng rãi, tích hợp đầy đủ tiện nghi cho kỳ lưu trú của bạn. Đặc biệt có bể bơi riêng, đây là lựa chọn lý tưởng dành cho các cặp đôi đi du lịch nghỉ dưỡng hoặc chuyến công tác 2 người.",
            images: [
              "6c1fb58b042e4e4d935ff3a2f2d841ae_VPLRNT__Grand_Duplex_Villa_13.png",
              "3.png",
              "33.png",
              "333.png",
              "3333.png",
              "3_3.png",
            ],
            amenities: [
              { icon: "fas fa-house-chimney", label: "2 tầng" },
              { icon: "fas fa-wifi", label: "Wifi miễn phí" },
              { icon: "fas fa-tv", label: "TV màn hình phẳng" },
              { icon: "fas fa-couch", label: "Phòng khách" },
              { icon: "fas fa-utensils", label: "Bếp nhỏ" },
              { icon: "fas fa-shower", label: "Vòi sen" },
            ],
          },
          {
            id: "garden-villa",
            name: "Biệt thự hướng vườn",
            price: "",
            description:
              "Với diện tích 60 m², biệt thự có thiết kế sang trọng, rộng rãi, tích hợp đầy đủ tiện nghi cho kỳ lưu trú của bạn. Tầm nhìn hướng vườn tươi xanh, Biệt thự là lựa chọn lý tưởng dành cho các cặp đôi đi du lịch nghỉ dưỡng hoặc chuyến công tác 2 người.",
            images: [
              "8ccd804500c843c1b5c5467f0c691883_VPLRNT_ Garden View Villa .png",
              "4.png",
              "333.png",
              "33.png",
              "3333.png",
              "3_3.png",
            ],
            amenities: [
              { icon: "fas fa-tree", label: "Hướng vườn" },
              { icon: "fas fa-wifi", label: "Wifi miễn phí" },
              { icon: "fas fa-bed", label: "Giường lớn" },
              { icon: "fas fa-bath", label: "Bồn tắm" },
              { icon: "fas fa-wine-bottle", label: "Minibar" },
              { icon: "fas fa-sun", label: "Sân tắm nắng" },
            ],
          },
          {
            id: "penthouse",
            name: "Presidential Penthouse",
            price: "15.800.000VNĐ / đêm",
            description:
              "Trải nghiệm độc bản và thượng lưu với diện tích 120m², hồ bơi vô cực riêng tư, dịch vụ quản gia 24/7 tận tâm. Penthouse thiết kế tinh tế với vật liệu cao cấp nhập khẩu, tầm nhìn 360° bao quát toàn cảnh biển Vũng Tàu hùng vĩ – đỉnh cao của sự sang trọng.",
            images: [
              "e1bb35a60c3c4ca196c1bc1dc360b181_DSC_4904 copy.png",
              "5.png",
              "55.png",
              "22.png",
              "222.png",
            ],
            amenities: [
              { icon: "fas fa-city", label: "Tầm nhìn thành phố" },
              { icon: "fas fa-bath", label: "Bồn tắm cao cấp" },
              { icon: "fas fa-wifi", label: "Wifi miễn phí" },
              { icon: "fas fa-tv", label: "TV lớn" },
              { icon: "fas fa-couch", label: "Phòng khách" },
              { icon: "fas fa-concierge-bell", label: "Dịch vụ cao cấp" },
            ],
          },
        ];

        const param = new URLSearchParams(location.search).get("room");
        const room = rooms.find((r) => r.id === param);

        const modal = document.getElementById("room-modal");
        const rdTitle = document.getElementById("rd-title");
        const rdMainImg = document.getElementById("rd-main-img");
        const rdPrice = document.getElementById("rd-price");
        const rdDesc = document.getElementById("rd-desc");
        const rdAmenities = document.getElementById("rd-amenities");
        const rdPrev = document.getElementById("rd-prev");
        const rdNext = document.getElementById("rd-next");
        const rdClose = document.querySelector(".rd-close");
        const rdBook = document.getElementById("rd-book");

        let currentIndex = 0;

        function imgPath(name) {
          return encodeURI("assets/images/room/" + name);
        }

        if (!room) {
          rdTitle.textContent = "Phòng không tìm thấy";
          rdDesc.textContent =
            "Không tìm thấy thông tin phòng. Vui lòng quay lại danh sách phòng.";
          rdPrice.textContent = "";
          rdMainImg.style.display = "none";
          rdBook.href = "./rooms.html";
        } else {
          modal.setAttribute("aria-hidden", "false");
          rdTitle.textContent = room.name;
          rdPrice.textContent = room.price;
          rdDesc.textContent = room.description;
          rdBook.href = "./booking.html?room=" + encodeURIComponent(room.id);

          // amenities
          rdAmenities.innerHTML = "";
          (room.amenities || []).forEach((a) => {
            const el = document.createElement("div");
            el.className = "amenity";
            el.innerHTML = `<i class="${a.icon}"></i><span>${a.label}</span>`;
            rdAmenities.appendChild(el);
          });

          function showImage(i) {
            if (!room.images || !room.images.length) {
              rdMainImg.style.display = "none";
              return;
            }
            currentIndex = (i + room.images.length) % room.images.length;
            rdMainImg.style.display = "block";
            rdMainImg.src = imgPath(room.images[currentIndex]);
            rdMainImg.alt = room.name + " " + (currentIndex + 1);
          }

          rdPrev.addEventListener("click", function (e) {
            e.stopPropagation();
            showImage(currentIndex - 1);
          });
          rdNext.addEventListener("click", function (e) {
            e.stopPropagation();
            showImage(currentIndex + 1);
          });
          showImage(0);
        }

        function closeModal() {
          if (document.referrer && document.referrer.includes("rooms.html"))
            history.back();
          else location.href = "./rooms.html";
        }

        rdClose.addEventListener("click", closeModal);
        modal.addEventListener("click", function (e) {
          if (e.target === modal) closeModal();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") rdClose.click();
          if (e.key === "ArrowLeft") rdPrev.click();
          if (e.key === "ArrowRight") rdNext.click();
        });
      });
    </script>
  </body>
</html>
