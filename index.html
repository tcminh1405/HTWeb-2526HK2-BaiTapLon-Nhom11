<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinpearl Luxury Nha Trang - Chào Mừng Đến Với Thiên Đường</title>
    <meta name="description"
        content="Khởi đầu hành trình nghỉ dưỡng đẳng cấp tại Vinpearl Luxury Nha Trang. Trải nghiệm không gian sang trọng và dịch vụ thượng lưu.">
    <link rel="icon" type="image/png" href="./assets/images/logo/favicon.png">

    <!-- Fonts (Integrated in globalStyle.css) -->
    <link rel="stylesheet" href="./css/globalStyle.css?v=1.1">

    <!-- Splash Specific CSS -->
    <link rel="stylesheet" href="./css/index.css">
</head>

<body class="splash-body">

    <!-- Background Layer -->
    <div class="splash-bg-container">
        <!-- Using high quality resort video -->
        <video autoplay muted loop playsinline class="splash-video">
            <source src="./assets/videos/Banner Video Website Vinpearl_1743759342.mp4" type="video/mp4">
        </video>
        <div class="splash-overlay"></div>
    </div>

    <!-- Location Badge -->
    <div class="location-badge">
        <div class="location-text">
            <b>Hòn Tre</b><br>
            <span>Nha Trang, Việt Nam</span>
        </div>
        <div class="location-dot"></div>
    </div>

    <!-- Main Content Content -->
    <main class="splash-content">
        <img src="./assets/images/logo/lux Nha trang-02_1679990219.svg" alt="Vinpearl Luxury" class="splash-logo">
        <h1 class="splash-tagline">Nơi Tuyệt Tác <br> Giao Thoa</h1>
        <p class="splash-sub">Khám phá thiên đường nghỉ dưỡng 5 sao bậc nhất</p>

        <div class="splash-actions">
            <a href="./home.html" class="btn-splash-explore" id="exploreBtn">
                Khám Phá Ngay
            </a>
        </div>
    </main>

    <!-- Auto Redirect Progress -->
    <div class="redirect-notice">
        Đang đưa bạn vào không gian nghỉ dưỡng...
    </div>
    <div class="progress-container">
        <div class="progress-bar" id="redirectProgress"></div>
    </div>

    <!-- Redirect Logic -->
    <script>
        const REDIRECT_DELAY = 8000; // 8 seconds
        const progressBar = document.getElementById('redirectProgress');
        const exploreBtn = document.getElementById('exploreBtn');

        let start = null;
        let animationFrame;

        function animate(timestamp) {
            if (!start) start = timestamp;
            const progress = (timestamp - start) / REDIRECT_DELAY;
            const percentage = Math.min(progress * 100, 100);

            progressBar.style.width = percentage + '%';

            if (progress < 1) {
                animationFrame = requestAnimationFrame(animate);
            } else {
                // Redirect
                window.location.href = './home.html';
            }
        }

        // Start countdown
        animationFrame = requestAnimationFrame(animate);

        // Cancel countdown if user clicks manual button
        exploreBtn.addEventListener('click', (e) => {
            cancelAnimationFrame(animationFrame);
        });
    </script>
</body>

</html>
