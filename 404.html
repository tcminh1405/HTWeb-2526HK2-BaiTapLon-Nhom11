<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="icon" type="image/png" href="./assets/images/logo/favicon.png">

    <!-- Offline Font Awesome & Bootstrap -->

<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="row align-items-center justify-content-between g-5">

            <!-- LEFT CONTENT -->
            <div class="col-lg-6 text-center text-lg-start">
                <h1 class="fw-bold text-dark display-3 fade-up" style="animation-delay:0.2s">
                    <span class="d-block text-primary-base">
                        <i class="fa-solid fa-magnifying-glass"></i> 404
                    </span>
                    <span class="d-block mt-2">Trang không tìm thấy</span>

                <p class="mt-4 fs-5 text-muted fade-up" style="animation-delay:0.4s">

                </p>

                <div class="mt-4 d-flex flex-column flex-sm-row gap-3 justify-content-center justify-content-lg-start fade-up"

                    </a>
                </div>
            </div>

            <!-- RIGHT IMAGE -->
            <div class="col-lg-6 position-relative text-center">
                <div class="position-relative">
                    <div class="blur-bg"></div>

                    <img src="https://img.freepik.com/free-vector/organic-flat-page-found-illustration_23-2148955260.jpg"
                        class="img-fluid position-relative floating" id="mainImage" alt="404 image">
                </div>

                <!-- Dots -->
                <div class="dot" style="width:20px;height:20px;top:25%;left:25%;animation-duration:3s;"></div>
                <div class="dot" style="width:14px;height:14px;bottom:30%;right:25%;animation-duration:4s;"></div>
                <div class="dot" style="width:10px;height:10px;top:50%;right:30%;animation-duration:5s;"></div>
            </div>

        </div>

<script src="assets/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
